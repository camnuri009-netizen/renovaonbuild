<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>리노바 관리자</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
<main id="login" class="login">
  <img src="logo-renova.png" alt="RENOVA">
  <h1>RENOVA 관리자</h1>
  <p>비밀번호를 입력하세요.</p>
  <input type="password" id="password" placeholder="비밀번호">
  <button onclick="login()">로그인</button>
  <small>초기 비밀번호: 1234</small>
</main>

<main id="dash" class="dash">
  <header>
    <h1>리노바 관리자</h1>
    <button onclick="logout()">로그아웃</button>
  </header>

  <section class="card">
    <h2>기본 정보 수정</h2>
    <input id="phone1" placeholder="전화번호 1 예: 010-8476-7456">
    <input id="phone2" placeholder="전화번호 2 예: 010-9169-7557">
    <input id="blog" placeholder="네이버 블로그 주소">
    <input id="kakao" placeholder="카카오 채널 주소">
    <button onclick="saveSettings()">기본 정보 저장</button>
  </section>

  <section class="card">
    <h2>시공사례 추가</h2>
    <input id="caseTitle" placeholder="제목 예: 상가철거 시공사례">
    <textarea id="caseDesc" placeholder="설명 입력"></textarea>
    <input id="caseImages" type="file" accept="image/*" multiple>
    <p>사진은 최대 10장까지 등록됩니다.</p>
    <button onclick="saveCase()">시공사례 저장</button>
  </section>

  <section class="card">
    <h2>등록된 시공사례</h2>
    <div id="caseList"></div>
  </section>
</main>

<script src="admin.js"></script>
</body>
</html>
