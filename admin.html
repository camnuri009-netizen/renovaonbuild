<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>리노바 CMS 관리자</title><link rel="stylesheet" href="styles.css"><script type="module" src="admin.js"></script></head><body>
<div id="loginView" class="login"><div class="login-card"><h1>RENOVA CMS</h1><div class="note">Firebase 이메일/비밀번호 로그인을 사용합니다.<br>초기 비밀번호는 <b>3015</b>로 설정하세요.</div><div class="field"><label>관리자 이메일</label><input id="loginEmail" type="email" placeholder="예: admin@renova.co.kr"></div><div class="field"><label>비밀번호</label><input id="loginPassword" type="password" value="3015"></div><br><button id="loginBtn" class="btn blue">로그인</button> <button id="setupBtn" class="btn white" style="border:1px solid #1769aa">최초 관리자 만들기</button><p id="loginMessage"></p></div></div>
<div id="adminView" class="admin hidden"><aside class="side"><h2>RENOVA CMS</h2><a href="#dashboard">방문자 현황</a><a href="#siteSection">기본 정보</a><a href="#serviceSection">서비스 관리</a><a href="#regionSection">지역 관리</a><a href="index.html" target="_blank">홈페이지 보기</a><a href="#" id="logoutBtn">로그아웃</a></aside><main class="main">
<section id="dashboard"><h1>관리자 대시보드</h1><div id="connectionNote" class="note"></div><div class="stats"><div class="stat"><span>오늘 방문자</span><b id="todayStat">0</b></div><div class="stat"><span>어제 방문자</span><b id="yesterdayStat">0</b></div><div class="stat"><span>누적 방문자</span><b id="totalStat">0</b></div><div class="stat"><span>등록 지역</span><b id="regionStat">0</b></div></div></section>
<section id="siteSection" class="panel"><h2>기본 정보</h2><div class="form-grid"><div class="field"><label>브랜드명</label><input id="brand"></div><div class="field"><label>메인 제목</label><input id="headline"></div><div class="field"><label>전화번호 1</label><input id="phone1"></div><div class="field"><label>전화번호 2</label><input id="phone2"></div><div class="field"><label>카카오 주소</label><input id="kakao"></div><div class="field"><label>블로그 주소</label><input id="blog"></div><div class="field" style="grid-column:1/-1"><label>메인 설명</label><textarea id="subheadline"></textarea></div><div class="field"><label>메인 이미지 업로드</label><input id="heroUpload" type="file" accept="image/*"></div><div class="field"><label>현재 이미지 경로</label><input id="heroImage"></div></div><br><button id="saveSiteBtn" class="btn blue">기본 정보 저장</button></section>
<section id="serviceSection" class="panel"><h2>서비스·이미지 3컷 관리</h2><div id="serviceEditors"></div><button id="saveServicesBtn" class="btn blue">서비스 전체 저장</button></section>
<section id="regionSection" class="panel"><h2>지역 관리</h2><div class="row"><input id="newRegionName" placeholder="예: 성남시"><input id="newRegionSlug" placeholder="예: seongnam"><button id="addRegionBtn" class="btn blue">지역 추가</button></div><div id="regionEditors"></div><button id="saveRegionsBtn" class="btn blue">지역 저장</button></section>
</main></div></body></html>
