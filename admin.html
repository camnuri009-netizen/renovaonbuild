<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RENOVA 관리자</title><style>body{margin:0;font-family:'Noto Sans KR',Arial,sans-serif;background:#07111c;color:#f4f7fb}.wrap{max-width:1000px;margin:40px auto;padding:0 18px}.login,.panel{background:#0d1b2a;border:1px solid #1d344b;border-radius:18px;padding:28px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{background:#102237;border:1px solid #1d344b;border-radius:16px;padding:22px}.num{font-size:38px;font-weight:900;color:#ff8500}input,button{padding:14px;border-radius:10px;border:1px solid #1d344b;background:#06101b;color:#fff}button{background:#0b73ff;font-weight:900;cursor:pointer}table{width:100%;border-collapse:collapse;margin-top:20px}td,th{border-bottom:1px solid #1d344b;padding:12px;text-align:left}.muted{color:#a9b6c7}@media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>RENOVA 관리자</h1><div id="login" class="login"><h2>관리자 로그인</h2><p class="muted">초기 비밀번호: 1234</p><input id="pw" type="password" placeholder="비밀번호"><button onclick="login()">로그인</button></div><div id="panel" class="panel" style="display:none"><h2>방문자 통계</h2><p class="muted">※ GitHub 정적 홈페이지 특성상 이 통계는 현재 브라우저 기준 간단 방문 기록입니다. 전체 방문자 정확한 통계는 구글 애널리틱스 연결을 추천합니다.</p><div class="grid"><div class="card"><h3>전체 방문수</h3><div class="num" id="total">0</div></div><div class="card"><h3>오늘 방문수</h3><div class="num" id="today">0</div></div><div class="card"><h3>최근 방문시간</h3><div id="last">-</div></div></div><p><button onclick="refresh()">새로고침</button> <button style="background:#ff8500" onclick="resetStats()">방문자 기록 초기화</button></p><h2>최근 방문 기록</h2><table><thead><tr><th>시간</th><th>페이지</th><th>기기정보</th></tr></thead><tbody id="logs"></tbody></table><hr style="border-color:#1d344b"><h2>빠른 링크</h2><p><a style="color:#7bb7ff" href="index.html" target="_blank">홈페이지 열기</a></p></div></div><script>function login(){if(document.getElementById('pw').value==='1234'){localStorage.setItem('renovaAdmin','1');show()}else alert('비밀번호를 확인하세요.')}function show(){document.getElementById('login').style.display='none';document.getElementById('panel').style.display='block';refresh()}if(localStorage.getItem('renovaAdmin')==='1')show();function getStats(){return JSON.parse(localStorage.getItem('renovaVisitorStats')||'{"total":0,"today":{},"logs":[]}')}function refresh(){const s=getStats();const d=new Date().toISOString().slice(0,10);document.getElementById('total').textContent=s.total||0;document.getElementById('today').textContent=(s.today&&s.today[d])||0;document.getElementById('last').textContent=(s.logs&&s.logs[0]&&s.logs[0].time)||'-';document.getElementById('logs').innerHTML=(s.logs||[]).map(x=>`<tr><td>${x.time}</td><td>${x.page}</td><td>${x.ua}</td></tr>`).join('')||'<tr><td colspan="3">기록 없음</td></tr>'}function resetStats(){if(confirm('초기화할까요?')){localStorage.removeItem('renovaVisitorStats');refresh()}}</script></body></html>
