<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>리노바 관리자</title><link rel="stylesheet" href="admin.css"></head><body>
<main id="login" class="login"><h1>리노바 관리자</h1><input id="pw" type="password" placeholder="비밀번호"><button onclick="loginAdmin()">로그인</button><small>비밀번호 1234</small></main>
<main id="dash" class="dash"><header><h1>리노바 관리창</h1><a href="index.html">홈페이지 보기</a></header>
<section><h2>메인 배너 / 전화번호</h2><input id="phoneIn" placeholder="전화번호"><input id="heroFile" type="file" accept="image/*"><button onclick="saveMain()">저장</button></section>
<section><h2>서비스 관리</h2><div id="serviceList"></div><button onclick="addService()">서비스 추가</button></section>
<section><h2>최근 다녀온 현장 관리</h2><input id="workTitle" placeholder="현장 제목"><input id="workMeta" placeholder="현장 설명"><input id="workFile" type="file" accept="image/*"><button onclick="addWork()">현장 추가</button><div id="workList" class="preview"></div></section>
<section><h2>회사소개 이미지</h2><input id="aboutFile" type="file" accept="image/*"><button onclick="saveAbout()">저장</button></section>
<button class="danger" onclick="logout()">로그아웃</button></main>
<div id="servicePop" class="pop"><div class="popBox"><button class="close" onclick="servicePop.classList.remove('show')">닫기</button><h2>서비스 수정</h2><input id="sTitle" placeholder="서비스 제목"><textarea id="sDesc" placeholder="서비스 설명"></textarea><input id="sFile" type="file" accept="image/*"><button onclick="saveService()">저장</button><button class="danger" onclick="deleteService()">삭제</button></div></div>
<script src="admin.js"></script></body></html>
