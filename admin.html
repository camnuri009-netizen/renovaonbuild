<!doctype html>
<html lang="ko">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>RENOVA 관리자 V6</title><link rel="stylesheet" href="assets/style.css"><style>.admin-wrap{max-width:860px;margin:40px auto;padding:24px}.panel{background:rgba(15,24,36,.94);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.35)}label{display:block;margin:18px 0 8px;font-weight:800}input,textarea{width:100%;box-sizing:border-box;border:1px solid rgba(255,255,255,.18);background:#07101b;color:#fff;border-radius:14px;padding:14px;font-size:15px}textarea{min-height:90px}.admin-actions{margin-top:22px;display:flex;gap:10px;flex-wrap:wrap}.hint{color:#aab7c6;line-height:1.7}</style></head>
<body><main class="admin-wrap"><div class="panel"><h1>RENOVA 관리자 V6</h1><p class="hint">전화번호, 카카오채널, 네이버 블로그 링크를 수정할 수 있습니다. 저장 후 메인 페이지를 새로고침하세요.</p><label>전화번호</label><textarea id="phone">010-8476-7456
010-9169-7557</textarea><label>카카오 링크</label><input id="kakao" value="http://pf.kakao.com/_VHqwX"><label>네이버 블로그 링크</label><input id="blog" value="https://blog.naver.com/camnuri26"><div class="admin-actions"><button class="btn primary" onclick="save()">저장하기</button><button class="btn" onclick="resetData()">초기화</button><a class="btn" href="index.html">홈페이지 보기</a></div></div></main><script>const saved=JSON.parse(localStorage.getItem('renova_admin')||'{}'); if(saved.phone) phone.value=saved.phone; if(saved.kakao) kakao.value=saved.kakao; if(saved.blog) blog.value=saved.blog; function save(){localStorage.setItem('renova_admin',JSON.stringify({phone:phone.value,kakao:kakao.value,blog:blog.value}));alert('저장되었습니다.');} function resetData(){localStorage.removeItem('renova_admin');location.reload();}</script></body></html>
