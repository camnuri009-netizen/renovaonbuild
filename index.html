<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>리노바 관리자</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="login" id="login">
    <img src="logo-renova.png" alt="RENOVA">
    <h1>RENOVA 관리자</h1>
    <input type="password" id="password" placeholder="비밀번호 입력">
    <button onclick="login()">로그인</button>
  </main>

  <main class="dash" id="dash" hidden>
    <header>
      <h1>리노바 관리자</h1>
      <button onclick="logout()">로그아웃</button>
    </header>

    <section class="card">
      <h2>시공사례 추가</h2>
      <input id="caseTitle" placeholder="제목 예: 상가철거 시공사례">
      <textarea id="caseDesc" placeholder="설명 입력"></textarea>
      <input id="caseImages" type="file" accept="image/*" multiple>
      <p>사진은 최대 10장까지 등록됩니다.</p>
      <button onclick="saveCase()">시공사례 저장</button>
    </section>

    <section class="card">
      <h2>등록된 시공사례</h2>
      <div id="caseList"></div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
